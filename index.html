<!doctype html>
<html lang="zh-Hans">
<head>

<title>faham · 在时间里看见政策</title>
<style>
  /* ══════ 主题：明亮＝档案馆　暗色＝观测台 ══════ */
  :root, :root[data-theme="light"] {
    --bg:        #f7f5f0;      /* 暖白纸 */
    --bg-2:      #efece4;
    --surface:   #fffdf9;
    --ink:       #1e1c18;
    --ink-2:     #55514a;
    --ink-3:     #8b857a;

    --hair:      rgba(30,28,24,.07);
    --axis:      rgba(30,28,24,.20);
    --t-subsidy: #b8770a;
    --t-tax:     #0f8073;
    --t-cost:    #bb3d58;
    --t-vote:    #5b4bc4;
    --t-graft:   #2b6fb0;
    --halo-op:   .16;
    --dot-glow:  0 0 0 1px rgba(255,255,255,.7), 0 1px 6px rgba(30,28,24,.18);
    --card-sh:   0 18px 50px -12px rgba(30,28,24,.26), 0 2px 10px rgba(30,28,24,.08);
    --glass:     rgba(255,253,249,.82);
    --amb-1:     rgba(184,119,10,.05);
    --amb-2:     rgba(43,111,176,.05);
  }
  :root[data-theme="dark"] {
    --bg:        #07080a;      /* 深空 */
    --bg-2:      #0d0f12;
    --surface:   rgba(18,20,25,.9);
    --ink:       #f2f4f6;
    --ink-2:     #a8b0ba;
    --ink-3:     #6b7480;
    --line:      rgba(255,255,255,.10);
    --hair:      rgba(255,255,255,.06);
    --axis:      rgba(255,255,255,.17);
    --t-subsidy: #f0a830;
    --t-tax:     #35d0c0;
    --t-cost:    #f2637f;
    --t-vote:    #9b8cf5;
    --t-graft:   #6cb6ff;
    --halo-op:   .34;
    --dot-glow:  0 0 10px var(--c), 0 0 22px color-mix(in srgb, var(--c) 55%, transparent);
    --card-sh:   0 24px 60px -14px rgba(0,0,0,.7);
    --glass:     rgba(16,18,22,.86);
    --amb-1:     rgba(60,90,140,.15);
    --amb-2:     rgba(120,70,130,.11);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin:0; height:100%; overflow:hidden; background: var(--bg); color: var(--ink);
    font-family: -apple-system,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC",system-ui,sans-serif;
    -webkit-font-smoothing: antialiased; transition: background .5s ease, color .5s ease; }
  body::before { content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(1000px 620px at 26% 40%, var(--amb-1), transparent 64%),
                radial-gradient(820px 520px at 82% 64%, var(--amb-2), transparent 64%); }
  :root { --serif: "Songti SC","STSong","Noto Serif CJK SC","Source Han Serif SC",Georgia,serif;
          --mono: ui-monospace,"SF Mono",Menlo,Consolas,monospace; }

  /* 画布上的文字禁止选中：否则点击标题会变成「划词选中」，导致被判为拖拽而不展开卡片。
     卡片内部单独恢复可选，以便复制引文与来源。 */
  #stage, #layer, #bar, #mini, #ruler, #hint { user-select:none; -webkit-user-select:none; }
  #card, #card * { user-select:text; -webkit-user-select:text; }
  #empty[hidden] { display:none !important; }   /* hidden 必须压过下面的 flex */
  #empty { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; gap:6px; background:var(--bg); }
  #empty h1 { font-family:var(--serif); font-size:34px; margin:0 0 6px; letter-spacing:.02em; }
  #empty p { margin:0; color:var(--ink-2); font-size:14px; }
  #empty .sub { color:var(--ink-3); font-size:12px; margin-top:10px; }
  #empty code { background:var(--bg-2); padding:1px 6px; border-radius:4px; font-size:11.5px; }
  #stage { position:fixed; inset:0; z-index:1; cursor:grab; touch-action:none; overscroll-behavior:none; }
  #stage.dragging { cursor:grabbing; }
  #layer { position:absolute; left:0; top:0; will-change:transform; z-index:3; }

  #axisLine { position:fixed; left:0; right:0; height:1px; z-index:2; pointer-events:none;

  .edge { position:fixed; top:0; bottom:0; width:120px; z-index:6; pointer-events:none; }
  .edge.l { left:0;  background: linear-gradient(to right, var(--bg) 6%, transparent); }
  .edge.r { right:0; background: linear-gradient(to left,  var(--bg) 6%, transparent); }

  /* ══════ 刻度 ══════ */
  .tk { position:absolute; width:1px; background: linear-gradient(to bottom, transparent, var(--hair) 20%, var(--hair) 80%, transparent); }
  .tk.era { background: linear-gradient(to bottom, transparent, var(--line) 16%, var(--line) 84%, transparent); }
  .eraCap { position:absolute; font-family:var(--mono); font-weight:300; white-space:nowrap;
    transform:translateX(-50%); color:var(--ink); opacity:.07; letter-spacing:.2em; }
  #ruler { position:fixed; left:0; right:0; bottom:46px; height:16px; z-index:12; pointer-events:none; overflow:hidden; }
  #ruler span { position:absolute; font-family:var(--mono); font-size:10.5px; letter-spacing:.12em;
    color:var(--ink-3); transform:translateX(-50%); white-space:nowrap; }

  /* ══════ 光点 ══════ */
  .node { position:absolute; transform:translate(-50%,-50%); transition:opacity .45s ease; }
  .halo { position:absolute; left:50%; top:50%; border-radius:50%; transform:translate(-50%,-50%);
    pointer-events:none; background:radial-gradient(circle, var(--c) 0%, transparent 68%);
    opacity:var(--halo-op); filter:blur(7px);
    animation:breathe var(--dur) ease-in-out infinite alternate; animation-delay:var(--delay); }
  @keyframes breathe { from{transform:translate(-50%,-50%) scale(.85)} to{transform:translate(-50%,-50%) scale(1.15)} }
  .dot { position:absolute; left:50%; top:50%; border-radius:50%; transform:translate(-50%,-50%);
    background:var(--c); box-shadow:var(--dot-glow); pointer-events:none;
    transition:transform .34s cubic-bezier(.22,.9,.28,1); }
  /* 透明热区：光点本身太小，点击判定放大到 38px */
  .hit { position:absolute; left:50%; top:50%; width:38px; height:38px; margin:-19px 0 0 -19px;
    border-radius:50%; cursor:pointer; }
  .ring { position:absolute; left:50%; top:50%; border-radius:50%; transform:translate(-50%,-50%) scale(.55);
    border:1px solid var(--c); opacity:0; pointer-events:none;
    transition:transform .44s cubic-bezier(.22,.9,.28,1), opacity .44s ease; }
  .node:hover .dot, .node.sel .dot { transform:translate(-50%,-50%) scale(1.5); }
  .node:hover .ring, .node.sel .ring { opacity:.6; transform:translate(-50%,-50%) scale(1); }
  .node.sel .ring { opacity:.9; }
  .node.dim { opacity:.2; }

  .lab { position:absolute; left:50%; width:190px; margin-left:-95px; pointer-events:none;
    opacity:0; transition:opacity .4s ease; text-align:center; }
  .lab.show { pointer-events:auto; cursor:pointer; }   /* 标题也可点开卡片 */
  .lab.show, .node:hover .lab { opacity:1; }
  .lab .stem { position:absolute; left:50%; width:1px; opacity:.4; }
  .lab .d { display:block; font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; color:var(--ink-3); margin-bottom:2px; }
  .lab .t { font-family:var(--serif); font-size:14px; font-weight:600; color:var(--ink-2); line-height:1.34;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; transition:color .3s ease; }
  .node:hover .lab .t, .node.sel .lab .t { color:var(--ink); }
  .lab .meta { display:block; font-size:9.5px; color:var(--ink-3); margin-top:3px; letter-spacing:.06em; }

  /* ══════ 详情卡：从光点向下展开 ══════ */
  #card { position:absolute; width:430px; margin-left:-215px; z-index:30;
    background:var(--surface); border:1px solid var(--line); border-radius:14px; box-shadow:var(--card-sh);
    backdrop-filter:blur(20px); overflow:hidden; display:none;
    transform-origin:top center; }
  #card.on { display:block; animation:bloom .5s cubic-bezier(.19,1,.22,1); }
  @keyframes bloom { from{opacity:0; transform:translateY(-10px) scaleY(.94)} to{opacity:1; transform:none} }
  #card .stemUp { position:absolute; left:50%; top:-22px; width:1px; height:22px;
    background:linear-gradient(transparent, var(--c)); opacity:.6; }
  #cardScroll { max-height:min(60vh,560px); overflow-y:auto; overscroll-behavior:contain;
    padding:20px 22px 22px; touch-action:pan-y; }
  #cardScroll::-webkit-scrollbar { width:6px; }
  #cardScroll::-webkit-scrollbar-thumb { background:var(--line); border-radius:3px; }
  .cClose { position:absolute; right:10px; top:10px; width:26px; height:26px; border-radius:50%;
    border:1px solid var(--line); background:var(--bg-2); color:var(--ink-3); cursor:pointer; font-size:12px; z-index:2; }
  .cClose:hover { color:var(--ink); }
  .c-date { font-family:var(--mono); font-size:10.5px; letter-spacing:.14em; color:var(--c); margin-bottom:7px; }
  .c-title { font-family:var(--serif); font-size:21px; font-weight:700; line-height:1.38; margin:0 0 12px; padding-right:26px; }
  .c-tags { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:18px; }
  .c-tags span { font-size:10px; color:var(--ink-2); border:1px solid var(--line); border-radius:99px; padding:3px 9px; }
  .c-tags span.st { border-color:color-mix(in srgb, var(--c) 45%, transparent); color:var(--c); }
  /* 每节以细分隔线断开，节奏统一 */
  .sec { margin:0; padding:15px 0 0; border-top:1px solid var(--hair); margin-top:15px; }
  .sec:first-of-type { border-top:none; margin-top:0; padding-top:0; }
  .sec h4 { font-size:9.5px; font-weight:700; letter-spacing:.18em; color:var(--ink-3); margin:0 0 9px; }
  .sec p { margin:0; font-size:13px; line-height:1.75; color:var(--ink-2); }
  .step { display:flex; gap:12px; font-size:12px; color:var(--ink-2); padding:3px 0; position:relative; align-items:flex-start; }
  .step .sd { font-family:var(--mono); font-size:10px; color:var(--ink-3); min-width:72px; padding-top:2px; flex:none; }
  .step .sb { position:relative; padding-left:15px; line-height:1.6; }
  .step .sb::before { content:""; position:absolute; left:0; top:6px; width:5px; height:5px; border-radius:50%;
    background:var(--ink-3); opacity:.55; }
  .step:last-child .sb::before { background:var(--c); opacity:1; }
  .step:last-child .sb { color:var(--ink); font-weight:500; }
  .claim { border-left:2px solid; padding:2px 0 2px 12px; margin-bottom:12px; }
  .claim:last-child { margin-bottom:0; }
  .claim.for{border-color:color-mix(in srgb,var(--t-tax) 65%,transparent)}
  .claim.against{border-color:color-mix(in srgb,var(--t-cost) 65%,transparent)}
  .claim.neutral{border-color:var(--line)}
  .claim .who { font-size:9.5px; letter-spacing:.1em; margin-bottom:4px; }
  .claim.for .who{color:var(--t-tax)} .claim.against .who{color:var(--t-cost)} .claim.neutral .who{color:var(--ink-3)}
  .claim .tx { font-size:12.5px; line-height:1.7; color:var(--ink-2); }
  .claim .sr { font-size:10.5px; margin-top:5px; }
  a { color:var(--ink-3); text-decoration:none; border-bottom:1px solid var(--line); transition:color .25s,border-color .25s; }
  a:hover { color:var(--c); border-color:var(--c); }
  .imp { display:flex; gap:10px; font-size:12px; padding:6px 0; border-bottom:1px solid var(--hair); }
  .imp:last-of-type{border-bottom:none}
  .imp .k { color:var(--ink-3); min-width:58px; }
  .imp .v { color:var(--ink-2); }
  .imp .v em { display:block; font-style:normal; font-size:10px; color:var(--ink-3); margin-top:2px; }
  .note { font-size:11px; line-height:1.66; color:var(--t-subsidy); background:color-mix(in srgb,var(--t-subsidy) 9%,transparent);
    border-radius:7px; padding:8px 10px; margin-top:8px; }
  .srcs { list-style:none; margin:0; padding:0; }
  .srcs li { font-size:11.5px; padding:3px 0; }

  /* 图片位 */
  .figs { display:flex; flex-direction:column; gap:9px; }
  .fig { border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--bg-2); }
  .fig .ph { height:126px; display:flex; align-items:center; justify-content:center; gap:7px;
    color:var(--ink-3); font-size:11px; letter-spacing:.05em;
    background:repeating-linear-gradient(135deg, transparent 0 9px, var(--hair) 9px 10px); }
  .fig img { width:100%; display:block; }
  .fig .cap { font-size:10.5px; color:var(--ink-3); padding:7px 10px; line-height:1.55; border-top:1px solid var(--hair); }

  /* 讨论位 */
  .disc { border-top:1px solid var(--line); margin-top:4px; padding-top:15px; }
  .disc .dh { display:flex; align-items:baseline; gap:8px; margin-bottom:10px; }
  .disc .dh b { font-size:12px; font-weight:600; }
  .disc .dh em { font-style:normal; font-size:9.5px; color:var(--ink-3); letter-spacing:.06em; }
  .cm { padding:9px 0; border-bottom:1px solid var(--hair); }
  .cm:last-of-type{border-bottom:none}
  .cm .top { display:flex; align-items:center; gap:6px; margin-bottom:4px; }
  .badge { font-size:9px; font-weight:700; border-radius:4px; padding:1px 6px; letter-spacing:.03em; }
  .badge.guest   { background:var(--bg-2); color:var(--ink-3); border:1px solid var(--line); }
  .badge.verified{ background:color-mix(in srgb,var(--t-graft) 15%,transparent); color:var(--t-graft); }
  .badge.trusted { background:color-mix(in srgb,var(--t-tax) 15%,transparent); color:var(--t-tax); }
  .cm .who2 { font-size:10.5px; color:var(--ink-3); }
  .cm .body { font-size:12px; line-height:1.68; color:var(--ink-2); }
  .composer { margin-top:11px; border:1px dashed var(--line); border-radius:9px; padding:10px 12px;
    font-size:11px; color:var(--ink-3); line-height:1.6; }
  .composer b { color:var(--ink-2); font-weight:600; }

  /* ══════ 界面外壳 ══════ */
  #bar { position:fixed; top:0; left:0; right:0; z-index:20; display:flex; align-items:flex-start; gap:14px;
    padding:16px 20px; pointer-events:none; }
  #bar > * { pointer-events:auto; }
  .mark { font-family:var(--serif); font-size:19px; font-weight:700; line-height:1.1; }
  .mark i { font-style:normal; color:var(--t-tax); }
  .mark small { display:block; font-family:inherit; font-size:9.5px; font-weight:400; color:var(--ink-3);
    letter-spacing:.16em; margin-top:2px; font-family:-apple-system,system-ui,sans-serif; }
  #legend { display:flex; gap:11px; flex-wrap:wrap; margin-top:9px; }
  #legend .lg { display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--ink-3); cursor:pointer; transition:color .25s; }
  #legend .lg:hover { color:var(--ink-2); }
  #legend .lg.off { opacity:.32; }
  #legend .sw { width:7px; height:7px; border-radius:50%; background:var(--c); }
  .spacer { flex:1; }
  .pill { display:flex; gap:2px; padding:3px; border:1px solid var(--line); border-radius:999px;
    background:var(--glass); backdrop-filter:blur(12px); }
  .pill button { font:inherit; font-size:12px; color:var(--ink-2); background:none; border:none;
    border-radius:999px; padding:5px 12px; cursor:pointer; transition:background .25s,color .25s; }
  .pill button:hover { color:var(--ink); background:var(--hair); }
  .pill button.on { background:var(--line); color:var(--ink); }
  .pill.z button { width:30px; padding:5px 0; font-size:15px; line-height:1; }
  #scaleTag { font-family:var(--mono); font-size:10px; color:var(--ink-3); letter-spacing:.1em;
    border:1px solid var(--line); border-radius:999px; padding:6px 11px; background:var(--glass); backdrop-filter:blur(12px); }

  #mini { position:fixed; left:20px; right:20px; bottom:14px; height:22px; z-index:20; cursor:pointer; }
  #mini .track { position:absolute; left:0; right:0; top:11px; height:1px; background:var(--line); }
  #mini .mdot { position:absolute; top:11px; width:3px; height:3px; border-radius:50%; transform:translate(-50%,-50%);
    background:var(--c); opacity:.6; }
  #mini .view { position:absolute; top:3px; height:16px; border-radius:8px; border:1px solid var(--ink-3); background:var(--hair); }

  #hint { position:fixed; left:50%; bottom:74px; transform:translateX(-50%); z-index:20; font-size:10.5px;
    color:var(--ink-3); background:var(--glass); backdrop-filter:blur(10px); border:1px solid var(--line);
    border-radius:999px; padding:6px 14px; transition:opacity .7s ease; pointer-events:none; }
  #hint.gone { opacity:0; }
  #hint b { color:var(--ink-2); font-weight:500; }

  @media (max-width:760px) {
    .mark small, #scaleTag { display:none; }
    #bar { padding:12px 13px; gap:8px; }
    .pill button { padding:5px 9px; font-size:11px; }
    #legend { gap:8px; margin-top:7px; }
    .lab .t { font-size:12.5px; }
    #card { width:min(94vw,430px); margin-left:calc(min(94vw,430px) / -2); }
    #hint { display:none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .halo { animation:none; } #card.on { animation:none; }
  }
</style>
</head>

<div id="stage"><div id="layer"></div></div>
<div id="empty" hidden>
  <h1>faham</h1>
  <p>档案尚未收录数据。</p>
  <p class="sub">收录准则见 <code>docs/governance.md</code>；数据结构见 <code>db/schema.sql</code>。</p>
</div>
<div id="axisLine"></div>
<div class="edge l"></div><div class="edge r"></div>
<div id="ruler"></div>

<div id="bar">
  <div>
    <div class="mark">faham<i>.</i><small>在时间里看见政策</small></div>
    <div id="legend"></div>
  </div>
  <div class="spacer"></div>
  <div id="scaleTag">年</div>

  </div>
  <div class="pill z"><button id="zout" aria-label="缩小">−</button><button id="zin" aria-label="放大">＋</button></div>

</div>

<script>
/* ═══════════ 事件数据 ═══════════
   img:     [{cap:"图注", src:"可选。留空则显示占位框"}]  ← 建议自托管，别外链（外链会让读者浏览器请求第三方）
   discuss: 讨论条数（阶段2接后端后才真实）
   ═══════════════════════════ */
const TOPICS = {
  subsidy:{name:"补贴改革",c:"var(--t-subsidy)"}, tax:{name:"税务",c:"var(--t-tax)"},
  cost:{name:"生活成本",c:"var(--t-cost)"}, vote:{name:"选举",c:"var(--t-vote)"}, graft:{name:"反贪问责",c:"var(--t-graft)"}
};

/* ═══════════ 事件数据 ═══════════
   数据不写死在代码里：运行时从 data/events.json 载入。
   该文件由数据库导出（见 db/schema.sql 的 export_events 视图），
   或在无后端时手工维护。空数组即为「纯架构」状态。
   ═══════════════════════════ */
let EVENTS = [];

/* ═══════════ 引擎 ═══════════ */
function boot() {
  const DAY = 864e5, $ = id => document.getElementById(id);
  const stage=$('stage'), layer=$('layer'), axisLine=$('axisLine'), ruler=$('ruler'),
        mini=$('mini'), miniView=mini.querySelector('.view'), hint=$('hint'), scaleTag=$('scaleTag');

  const evs = EVENTS.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  evs.forEach((e,i)=>{ e._i=i; e._t=new Date(e.date).getTime(); });
  const PAD=120*DAY, T0=evs[0]._t-PAD, T1=evs[evs.length-1]._t+PAD, SPAN=(T1-T0)/DAY;

  let vw=1200, vh=700;
  const sync=()=>{ vw=innerWidth||document.documentElement.clientWidth||1200;
                   vh=innerHeight||document.documentElement.clientHeight||700; };
  sync();
  const AY = () => Math.round(vh*0.46);          // 轴线基准屏幕位置
  const LEFT = 120;
  const fitScale = () => (vw-LEFT*2)/SPAN;
  const maxScale = () => Math.max(420, vw*0.92);   // 最深可放大到「一天≈占满屏宽」
  let MIN_S=.2, MAX_S=maxScale();

  let s=1,sT=1, ox=0,oxT=0, oy=0,oyT=0;          // 缩放 + 二维偏移
  let hidden={}, selected=null;
  const dayOf=t=>(t-T0)/DAY;

  function clampX(v,sc){ const W=SPAN*sc, lo=LEFT-140, hi=LEFT+W-vw+140;
    return hi<lo ? LEFT+W/2-vw/2 : Math.max(lo,Math.min(hi,v)); }
  function clampY(v){
    let lo = -(vh-AY()-120), hi = AY()-90;        // 保证轴线不被拖出视野
    if (selected && cardH) hi = Math.max(hi, cardTop + cardH - (vh-AY()) + 40);
    return Math.max(lo, Math.min(hi, v));
  }

  /* ── 光点 ── */
  evs.forEach(e=>{
    const tp=TOPICS[e.topic], n=document.createElement('div');
    n.className='node'; n.style.setProperty('--c',tp.c);
    const marks = (e.img?.length?'🖼 ':'') + (e.discuss?`💬 ${e.discuss}`:'');
    n.innerHTML=`<div class="halo"></div><div class="ring"></div><div class="dot"></div><div class="hit"></div>
      <div class="lab"><span class="stem"></span><span class="d">${e.label}</span>
      <span class="t">${e.title}</span>${marks?`<span class="meta">${marks}</span>`:''}</div>`;
    const sz=7+e.w*2.2;
    n.querySelector('.dot').style.cssText+=`width:${sz}px;height:${sz}px`;
    n.querySelector('.halo').style.cssText+=`width:${sz*5}px;height:${sz*5}px;--dur:${5+(e._i%5)*.9}s;--delay:${(e._i%7)*.55}s`;
    n.querySelector('.ring').style.cssText+=`width:${sz*2.6}px;height:${sz*2.6}px`;
    layer.appendChild(n); n._ev=e;      // 反查：pointerup 时从 DOM 找回对应事件
    e._el=n; e._lab=n.querySelector('.lab'); e._stem=n.querySelector('.stem');
  });

  /* ── 详情卡 ── */
  const card=document.createElement('div'); card.id='card';
  card.innerHTML='<button class="cClose" id="cClose">✕</button><span class="stemUp"></span><div id="cardScroll"></div>';
  layer.appendChild(card);
  const cardScroll=$('cardScroll');
  let cardTop=0, cardH=0;
  card.addEventListener('pointerdown',e=>e.stopPropagation());   // 卡内不触发画布拖拽
  // 卡内滚轮必须截断，否则会冒泡到画布被 preventDefault 吃掉，导致卡片滚不动
  card.addEventListener('wheel',e=>e.stopPropagation(),{passive:true});
  $('cClose').onclick=()=>close();

  /* ── 图例 ── */
  const lgBox=$('legend');
  Object.entries(TOPICS).forEach(([k,v])=>{
    const d=document.createElement('div'); d.className='lg';
    d.innerHTML=`<span class="sw" style="--c:${v.c}"></span>${v.name}`;
    d.onclick=()=>{ hidden[k]=!hidden[k]; d.classList.toggle('off',!!hidden[k]); layout(); };
    lgBox.appendChild(d);
  });

  /* ── 底部导览 ── */
  evs.forEach(e=>{ const d=document.createElement('div'); d.className='mdot';
    d.style.setProperty('--c',TOPICS[e.topic].c);
    d.style.left=(dayOf(e._t)/SPAN*100)+'%'; mini.appendChild(d); });

  /* ── 刻度粒度 ── */
  const LEVELS=[{u:'day',n:1,d:1},{u:'day',n:7,d:7},{u:'month',n:1,d:30.44},
                {u:'month',n:3,d:91.3},{u:'year',n:1,d:365},{u:'year',n:5,d:1826}];
  const NAME={day:'日',month:'月',year:'年'};
  const pickLevel=sc=>LEVELS.find(L=>L.d*sc>=78)||LEVELS[LEVELS.length-1];
  function* steps(L,from,to){
    const d=new Date(from);
    if(L.u==='year'){ d.setMonth(0,1); d.setHours(0,0,0,0); d.setFullYear(Math.floor(d.getFullYear()/L.n)*L.n);
      while(d<=to){ yield new Date(d); d.setFullYear(d.getFullYear()+L.n);} }
    else if(L.u==='month'){ d.setDate(1); d.setHours(0,0,0,0); d.setMonth(Math.floor(d.getMonth()/L.n)*L.n);
      while(d<=to){ yield new Date(d); d.setMonth(d.getMonth()+L.n);} }
    else { d.setHours(0,0,0,0); while(d<=to){ yield new Date(d); d.setDate(d.getDate()+L.n);} }
  }
  const fmt=(dt,u)=> u==='year'?dt.getFullYear()+''
    : u==='month'?(dt.getMonth()===0?dt.getFullYear()+'年':(dt.getMonth()+1)+'月')
    : (dt.getMonth()+1)+'月'+dt.getDate()+'日';
  const rulePool=[], capPool=[], eraPool=[];
  function px(el,parent){ if(!el.parentNode) parent.appendChild(el); }

  function drawTicks(L){
    const t0=T0+((ox-LEFT)/s)*DAY-60*DAY, t1=T0+((ox-LEFT+vw)/s)*DAY+60*DAY;
    const rules=[], caps=[], eras=[];
    const yearPx=365*s;
    if(yearPx>=46 && L.u!=='year'){
      const st=yearPx>150?1:yearPx>74?2:5;
      for(const dt of steps({u:'year',n:st},t0,t1)) eras.push({t:dt.getTime(),cap:dt.getFullYear()+''});
    }
    for(const dt of steps(L,t0,t1)){
      rules.push({t:dt.getTime(),era:L.u==='year'});
      caps.push({t:dt.getTime(),cap:fmt(dt,L.u)});
      if(L.u==='year') eras.push({t:dt.getTime(),cap:dt.getFullYear()+''});
    }
    // 竖线（在 layer 内，随二维平移）
    while(rulePool.length<rules.length){ const d=document.createElement('div'); layer.appendChild(d); rulePool.push(d); }
    rulePool.forEach((el,i)=>{ const it=rules[i];
      if(!it){ el.style.display='none'; return; }
      el.style.display=''; el.className='tk'+(it.era?' era':'');
      el.style.cssText+=`left:${dayOf(it.t)*s+LEFT}px;top:${-vh*1.5}px;height:${vh*3}px`; });
    // 年份大字（layer 内，作背景层）
    while(eraPool.length<eras.length){ const d=document.createElement('div'); d.className='eraCap'; layer.appendChild(d); eraPool.push(d); }
    eraPool.forEach((el,i)=>{ const it=eras[i];
      if(!it){ el.style.display='none'; return; }
      el.style.display=''; el.textContent=it.cap;
      el.style.cssText+=`left:${dayOf(it.t)*s+LEFT}px;top:${-vh*0.30}px;font-size:${Math.min(52,Math.max(22,yearPx*.13))}px`; });
    // 底部时间尺（固定，只跟横向）
    while(capPool.length<caps.length){ const sp=document.createElement('span'); ruler.appendChild(sp); capPool.push(sp); }
    capPool.forEach((el,i)=>{ const it=caps[i];
      if(!it){ el.style.display='none'; return; }
      el.style.display=''; el.textContent=it.cap; el.style.left=(dayOf(it.t)*s+LEFT-ox)+'px'; });
  }

  /* ── 布局 ── */
  function layout(){
    sync();
    const ay=AY();
    axisLine.style.top=(ay-oy)+'px';
    layer.style.transform=`translate3d(${-ox}px,${ay-oy}px,0)`;

    const L=pickLevel(s);
    scaleTag.textContent=(L.n>1?L.n:'')+NAME[L.u];
    drawTicks(L);

    evs.forEach(e=>{
      const x=dayOf(e._t)*s+LEFT, el=e._el, off=!!hidden[e.topic];
      el.style.left=x+'px'; el.style.top='0px';
      el.style.display=off?'none':'';
      el.classList.toggle('dim',!!selected&&selected!==e&&!off);
      e._x=x;
    });

    // 标签：上下交替分层，横向不重叠且光点在屏内才显示
    const LW=190, LH=64, rows=[-1,1,-2,2,-3,3];
    const occ=new Map(rows.map(r=>[r,-1e9]));
    const vis=evs.filter(e=>!hidden[e.topic]).sort((a,b)=>a._x-b._x);
    vis.forEach(e=>{
      const lab=e._lab, sx=e._x-ox;
      if(sx<-10||sx>vw+10||(selected&&selected===e)){ lab.classList.remove('show'); return; }
      let r=null;
      for(const cand of rows) if(e._x-LW/2>occ.get(cand)+16){ occ.set(cand,e._x+LW/2); r=cand; break; }
      if(r===null){ lab.classList.remove('show'); return; }
      const up=r<0, dist=30+(Math.abs(r)-1)*(LH+12);
      lab.style.top = up ? -(dist+LH)+'px' : dist+'px';
      // 靠近屏幕边缘时把标签吸附回视野内，连接线仍指向光点
      const want=Math.max(LW/2+10, Math.min(vw-LW/2-10, sx)), shift=want-sx;
      lab.style.marginLeft=(-LW/2+shift)+'px';
      e._stem.style.cssText = (up
        ? `top:${LH}px;height:${dist-8}px;background:linear-gradient(var(--c),transparent)`
        : `bottom:100%;height:${dist-8}px;background:linear-gradient(transparent,var(--c))`)
        + `;left:calc(50% - ${shift}px)`;
      lab.classList.add('show');
    });

    if(selected){ card.style.left=selected._x+'px'; card.style.top=cardTop+'px'; }

    const W=SPAN*s;
    miniView.style.left=(Math.max(0,(ox-LEFT)/W)*100)+'%';
    miniView.style.width=Math.max(2,Math.min(100,vw/W*100))+'%';
  }

  /* ── 平滑循环 ── */
  let raf=null, still=0;
  function frame(){
    const ds=sT-s, dx=oxT-ox, dy=oyT-oy;
    if(Math.abs(ds)<1e-5&&Math.abs(dx)<.06&&Math.abs(dy)<.06){
      s=sT; ox=oxT; oy=oyT; layout();
      if(++still>4){ raf=null; return; }
    } else still=0;
    s+=ds*.16; ox+=dx*.19; oy+=dy*.19;
    layout(); raf=requestAnimationFrame(frame);
  }
  const kick=()=>{ still=0; if(!raf) raf=requestAnimationFrame(frame); };

  /* ── 交互：二维自由拖拽 ── */
  function zoomAt(f,ax){
    sync(); MAX_S=maxScale(); MIN_S=Math.min(fitScale(),MAX_S);
    const ns=Math.max(MIN_S,Math.min(MAX_S,sT*f)); if(ns===sT) return;
    const at=(ax+oxT-LEFT)/sT; sT=ns; oxT=clampX(at*sT-ax+LEFT,sT); kick();
  }
  stage.addEventListener('wheel',e=>{
    e.preventDefault();
    if(e.ctrlKey||e.metaKey) zoomAt(Math.exp(-e.deltaY*.0125),e.clientX);
    else if(e.shiftKey) { oxT=clampX(oxT+e.deltaY*1.1,sT); kick(); }
    else { oxT=clampX(oxT+e.deltaX*1.1,sT); oyT=clampY(oyT+e.deltaY*1.1); kick(); }
    dismiss();
  },{passive:false});

  let drag=null,moved=0,downEl=null;
  stage.addEventListener('pointerdown',e=>{
    moved=0; downEl=e.target;      // 记下按下的元素，松手时据此判定
    drag={x:e.clientX,y:e.clientY,ox:oxT,oy:oyT,m:0};
    stage.classList.add('dragging'); stage.setPointerCapture(e.pointerId);
  });
  stage.addEventListener('pointermove',e=>{
    if(!drag) return;
    const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
    drag.m=Math.max(drag.m,Math.abs(dx)+Math.abs(dy));
    oxT=ox=clampX(drag.ox-dx,sT); oyT=oy=clampY(drag.oy-dy);
    layout(); dismiss();
  });
  const endDrag=()=>{ moved=drag?drag.m:0; drag=null; stage.classList.remove('dragging'); };
  // 关键：setPointerCapture 会把 pointerup 锁到画布上，浏览器算出的 click 目标随之变成画布，
  // 元素自身的 click 处理器永远不触发。所以点击判定必须放在 pointerup，而不是依赖 click 事件。
  stage.addEventListener('pointerup',e=>{
    const m=drag?drag.m:0;
    endDrag();
    if(m>8) return;                                   // 位移够大＝拖拽，不是点击
    if(downEl&&downEl.closest('#card')) return;        // 卡内交互由卡片自己处理
    const nodeEl=downEl&&downEl.closest('.node');
    if(nodeEl&&nodeEl._ev){ open(nodeEl._ev); return; }
    close();
  });
  stage.addEventListener('pointercancel',endDrag);

  let pinch=null;
  stage.addEventListener('touchstart',e=>{ if(e.touches.length===2){
    const[a,b]=e.touches; pinch={d:Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),s:sT};
    drag=null; stage.classList.remove('dragging'); } },{passive:true});
  stage.addEventListener('touchmove',e=>{
    if(pinch&&e.touches.length===2){ e.preventDefault();
      const[a,b]=e.touches, d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY), mid=(a.clientX+b.clientX)/2;
      const ns=Math.max(MIN_S,Math.min(MAX_S,pinch.s*(d/pinch.d)));
      const at=(mid+oxT-LEFT)/sT; sT=ns; oxT=clampX(at*sT-mid+LEFT,sT); kick(); dismiss(); }
  },{passive:false});
  stage.addEventListener('touchend',e=>{ if(e.touches.length<2) pinch=null; },{passive:true});

  $('zin').onclick=()=>zoomAt(1.6,vw/2);
  $('zout').onclick=()=>zoomAt(1/1.6,vw/2);

  /* ── 范围预设 ── */
  const rbs=[...document.querySelectorAll('#ranges button')];
  function setRange(y,mark){
    sync(); MAX_S=maxScale(); MIN_S=Math.min(fitScale(),MAX_S);
    if(y===0){ sT=MIN_S; oxT=clampX(LEFT+SPAN*sT/2-vw/2,sT); }
    else { sT=Math.max(MIN_S,Math.min(MAX_S,(vw-260)/(y*365)));
           oxT=clampX(dayOf(evs[evs.length-1]._t)*sT+LEFT-vw*.72,sT); }
    oyT=clampY(0);
    rbs.forEach(b=>b.classList.toggle('on',b===mark)); kick(); dismiss();
  }
  rbs.forEach(b=>b.onclick=()=>setRange(+b.dataset.r,b));
  mini.addEventListener('pointerdown',e=>{
    const r=mini.getBoundingClientRect(), p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    oxT=clampX(p*SPAN*sT+LEFT-vw/2,sT); kick(); dismiss();
  });

  /* ── 详情：从光点向下展开 ── */
  function open(e){
    selected=e; evs.forEach(x=>x._el.classList.toggle('sel',x===e));
    const tp=TOPICS[e.topic], S=[];
    S.push(`<div class="c-date">${e.label}</div><h3 class="c-title">${e.title}</h3>`);
    S.push(`<div class="c-tags"><span class="st">${tp.name}</span>${e.who?`<span>${e.who}</span>`:''}</div>`);
    if(e.why) S.push(`<div class="sec"><h4>起因</h4><p>${e.why}</p></div>`);
    if(e.img?.length) S.push(`<div class="sec"><h4>图像资料</h4><div class="figs">${
      e.img.map(g=>`<div class="fig">${g.src?`<img src="${g.src}" alt="">`:`<div class="ph">🖼 图片位</div>`}<div class="cap">${g.cap}</div></div>`).join('')}</div></div>`);
    if(e.hist?.length) S.push(`<div class="sec"><h4>状态历程 · 留痕不删</h4>${
      e.hist.map(h=>`<div class="step"><span class="sd">${h.d}</span><span class="sb">${h.t}</span></div>`).join('')}</div>`);
    if(e.claims?.length) S.push(`<div class="sec"><h4>各方主张 · 并列呈现</h4>${
      e.claims.map(c=>`<div class="claim ${c.side}"><div class="who">${c.who}</div><div class="tx">${c.tx}</div>${
        c.sr&&c.sr!=='—'?`<div class="sr">依据：${c.url?`<a href="${c.url}" target="_blank" rel="noopener noreferrer">${c.sr}</a>`:c.sr}</div>`:''}</div>`).join('')}</div>`);
    if(e.impact?.length||e.note) S.push(`<div class="sec"><h4>差异化影响 · 用数据说话</h4>${
      (e.impact||[]).map(i=>`<div class="imp"><span class="k">${i.k}</span><span class="v">${i.v}${i.s&&i.s!=='—'?`<em>来源：${i.s}</em>`:''}</span></div>`).join('')
      }${e.note?`<div class="note">${e.note}</div>`:''}</div>`);
    if(e.srcs?.length) S.push(`<div class="sec"><h4>主要来源</h4><ul class="srcs">${
      e.srcs.map(x=>`<li><a href="${x.u}" target="_blank" rel="noopener noreferrer">${x.l}</a></li>`).join('')}</ul></div>`);
    S.push(`<div class="disc"><div class="dh"><b>讨论 · ${e.discuss||0} 条</b><em>阶段2开放 · 以下为版式示意</em></div>
      <div class="cm"><div class="top"><span class="badge trusted">受信任</span><span class="who2">账号存在 8 个月 · 12 条主张被标记「来源可靠」</span></div>
        <div class="body">补充一条来源：LHDN 官网的分阶段表格在 2025 年 6 月改过一次，旧链接已失效，建议改引存档版。</div></div>
      <div class="cm"><div class="top"><span class="badge verified">已验证</span><span class="who2">已验证邮箱</span></div>
        <div class="body">想问差异化影响那一栏——按行业细分的数据有没有公开来源？没有的话是不是不该放上来。</div></div>
      <div class="composer"><b>说明：</b>此帖每人每 24 小时最多 2 条，计数绑定账号而非 IP；提交前需通过人机验证。评论功能须待后端与审核流程就绪后开放——这是平台法律风险最集中的一环。</div></div>`);
    cardScroll.innerHTML=S.join('');
    card.style.setProperty('--c',tp.c);
    cardTop=34;
    card.classList.remove('on'); void card.offsetWidth; card.classList.add('on');
    requestAnimationFrame(()=>{ cardH=card.offsetHeight||420;
      oxT=clampX(dayOf(e._t)*sT+LEFT-vw*.42,sT);
      oyT=clampY(AY()-vh*.30);
      kick(); });
    // rAF 被节流时的兜底
    cardH=card.offsetHeight||420;
    oxT=clampX(dayOf(e._t)*sT+LEFT-vw*.42,sT); oyT=clampY(AY()-vh*.30);
    kick(); layout(); dismiss();
  }
  function close(){ selected=null; card.classList.remove('on');
    evs.forEach(x=>x._el.classList.remove('sel')); layout(); }
  /* 开关卡片统一由上面的 pointerup 处理，这里不再监听 click */
  addEventListener('keydown',e=>{
    if(e.key==='Escape') close();
    if(e.key==='+'||e.key==='=') zoomAt(1.4,vw/2);
    if(e.key==='-'||e.key==='_') zoomAt(1/1.4,vw/2);
    if(e.key==='ArrowRight'){ oxT=clampX(oxT+120,sT); kick(); }
    if(e.key==='ArrowLeft'){ oxT=clampX(oxT-120,sT); kick(); }
    if(e.key==='ArrowDown'){ oyT=clampY(oyT+100); kick(); }
    if(e.key==='ArrowUp'){ oyT=clampY(oyT-100); kick(); }
  });

  /* ── 主题 ── */
  const root=document.documentElement;
  const getT=()=>{ try{return localStorage.getItem('faham-theme')}catch(_){return null} };
  const setT=v=>{ try{localStorage.setItem('faham-theme',v)}catch(_){} };
  root.setAttribute('data-theme', getT() || 'light');   // 默认「档案馆」明亮
  $('theme').onclick=()=>{ const n=root.getAttribute('data-theme')==='dark'?'light':'dark';
    root.setAttribute('data-theme',n); setT(n); };

  let gone=false; const dismiss=()=>{ if(!gone){gone=true; hint.classList.add('gone');} };
  setTimeout(dismiss,9000);

  function resize(){ sync(); MAX_S=maxScale(); MIN_S=Math.min(fitScale(),MAX_S);
    sT=Math.max(MIN_S,Math.min(MAX_S,sT)); oxT=clampX(oxT,sT); oyT=clampY(oyT); layout(); }
  addEventListener('resize',()=>{resize();kick();});
  if(window.visualViewport) visualViewport.addEventListener('resize',()=>{resize();kick();});

  function start(){ setRange(2,rbs[2]); s=sT; ox=oxT; oy=oyT; layout(); }
  sync(); MAX_S=maxScale(); MIN_S=Math.min(fitScale(),MAX_S); start();
  requestAnimationFrame(start); addEventListener('load',start);
}

/* 载入数据后启动；无数据时显示空状态而非白屏 */
fetch('./data/events.json')
  .then(r => r.ok ? r.json() : [])
  .catch(() => [])            // file:// 直开会失败，视为空数据
  .then(rows => {
    EVENTS = Array.isArray(rows) ? rows : [];
    const emptyEl = document.getElementById('empty');
    if (!EVENTS.length) {
      emptyEl.hidden = false;
      document.getElementById('bar').style.opacity = '.45';
      return;
    }
    emptyEl.hidden = true;      // 有数据：务必收起空状态遮罩
    boot();
  });
</script>
</body>
</html>
